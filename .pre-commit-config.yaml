repos:
-   repo: local
    hooks:
    - id: ruff-check
      name: ruff-check
      description: "Lint Python via 'ruff check'"
      entry: uv run ruff check --fix
      language: system
      types_or: [python, pyi]
      require_serial: true
    - id: ruff-format
      name: ruff-format
      description: "Format Python via 'ruff format'"
      entry: uv run ruff format
      language: system
      types_or: [python, pyi]
      require_serial: true
    - id: pytest
      name: pytest
      description: "Test Python via 'pytest'"
      entry: uv run pytest
      language: system
      types_or: [python, pyi]
      pass_filenames: false
      require_serial: true
